name: lifepadi
description: Cutting-edge logistics solution.

publish_to: "none" # Prevents publishing to pub.dev

version: 1.3.4+23

environment:
  sdk: ">=3.4.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.3
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2
  riverpod_annotation: ^2.2.1
  flutter_animate: ^4.2.0+1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  logger: ^2.4.0
  pinput: ^5.0.0

  # Icons
  remixicon: ^1.2.0
  flutter_material_design_icons: ^1.1.7447
  iconsax_plus: ^1.0.0
  iconly: ^1.0.1

  fluttertoast: ^8.2.6
  intl: ^0.20.2
  salomon_bottom_bar: ^3.3.2
  expandable: ^5.0.1
  flutter_rating_bar: ^4.0.1

  vector_graphics: any
  form_validator: ^2.1.1
  dio: ^5.7.0
  intl_phone_number_input: ^0.7.4
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  dart_mappable: ^4.2.2
  skeletonizer: ^1.4.2
  cached_network_image: ^3.4.1
  infinite_scroll_pagination: ^4.0.0
  super_sliver_list: ^0.4.1
  flutter_polyline_points: ^2.1.0
  google_maps_flutter: ^2.9.0
  location: ^8.0.0
  calendar_date_picker2: ^1.1.7
  webview_flutter: ^4.10.0
  signalr_netcore: ^1.4.0
  url_launcher: ^6.3.1
  # Network connectivity package
  internet_connection_checker: ^3.0.1
  # Awesome plugins for local notifications
  awesome_notifications_core: ^0.10.1
  awesome_notifications: ^0.10.1
  # Awesome plugins for remote push notifications
  awesome_notifications_fcm: ^0.10.1
  workmanager:
    git:
      url: https://github.com/fluttercommunity/flutter_workmanager.git
      path: workmanager
      ref: main
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_messaging: ^15.1.6
  local_auth: ^2.3.0
  google_places_flutter: ^2.0.9
  app_links: ^6.4.0

dev_dependencies:
  build_runner: ^2.4.12
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.3.5
  go_router_builder: ^2.3.4
  flutter_gen_runner: ^5.6.0
  dart_mappable_builder: ^4.2.3

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/images/auth-heros/
    - assets/images/categories/
    - assets/images/vendors/
    - assets/icons/

flutter_gen:
  output: lib/utils/
  line_length: 100

  # Optional
  integrations:
    image: true
    flutter_svg: true
    lottie: true
    rive: false
