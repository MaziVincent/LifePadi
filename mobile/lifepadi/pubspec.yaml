name: lifepadi
description: Cutting-edge logistics solution.

publish_to: "none" # Prevents publishing to pub.dev

version: 1.3.0+4

environment:
  sdk: ">=3.4.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.3
  hooks_riverpod: ^2.4.4
  flutter_hooks: ^0.20.3
  riverpod_annotation: ^2.2.1
  flutter_animate: ^4.2.0+1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  logger: ^2.4.0
  pinput: ^5.0.0

  # Icons
  remixicon: ^1.2.0
  flutter_material_design_icons: ^1.1.7447
  iconsax_plus: ^1.0.0
  iconly: ^1.0.1

  fluttertoast: ^8.2.6
  intl: ^0.19.0
  salomon_bottom_bar: ^3.3.2
  expandable: ^5.0.1
  flutter_rating_bar: ^4.0.1

  vector_graphics: any
  form_validator: ^2.1.1
  dio: ^5.7.0
  intl_phone_number_input: ^0.7.4
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  dart_mappable: ^4.2.2
  skeletonizer: ^1.4.2
dev_dependencies:
  build_runner: ^2.4.12
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.2
  riverpod_generator: ^2.3.5
  go_router_builder: ^2.3.4
  flutter_gen_runner: ^5.6.0
  dart_mappable_builder: ^4.2.3

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/images/auth-heros/
    - assets/images/categories/
    - assets/images/vendors/
    - assets/icons/

flutter_gen:
  output: lib/utils/
  line_length: 100

  # Optional
  integrations:
    flutter_svg: true
    lottie: true
    flare_flutter: false
    rive: false
