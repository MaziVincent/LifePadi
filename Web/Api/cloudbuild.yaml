substitutions:
  _TAG: "latest"
steps:
  # Step 1: Build the Docker image and tag it for Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: [
      "build", 
      "-t", "us-east1-docker.pkg.dev/$PROJECT_ID/lifepadi-repo/lifepadi-v2:${_TAG}", 
      "."
    ]

  # Step 2: Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: [
      "push", 
      "us-east1-docker.pkg.dev/$PROJECT_ID/lifepadi-repo/lifepadi-v2:${_TAG}"
    ]

  # Step 3: Deploy the pushed image to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args: [
      "run",
      "deploy",
      "lifepadi-v2",
      "--image=us-east1-docker.pkg.dev/$PROJECT_ID/lifepadi-repo/lifepadi-v2:${_TAG}",
      "--region=us-east1",
      "--platform=managed",
      "--allow-unauthenticated",
      "--memory=1Gi",
      "--cpu=1",
      "--max-instances=10",
      "--port=8080"
    ]

timeout: "1200s"
