steps:
  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/lifepadi-api:$SHORT_SHA", "."]

  # Step 2: Push the Docker image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/lifepadi-api:$SHORT_SHA"]

  # Step 3: Deploy the new image to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "lifepadi-v2"
      - "--image=gcr.io/$PROJECT_ID/lifepadi-api:$SHORT_SHA"
      - "--region=us-east1"
      - "--platform=managed"

timeout: "1200s"
