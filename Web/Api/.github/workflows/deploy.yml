name: Deploy to AWS Lambda

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '3.1.x'

    - name: Install dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Package Lambda function
      run: dotnet lambda package --configuration Release --output-package ./MyLambdaFunction.zip

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2  # Change to your region

    - name: Upload to S3
      run: aws s3 cp MyLambdaFunction.zip s3://lifepadi-bucket/MyLambdaFunction.zip

    - name: Deploy to Lambda
      run: aws lambda update-function-code --function-name MyLambdaFunction --s3-bucket my-lambda-artifacts-bucket --s3-key MyLambdaFunction.zip
